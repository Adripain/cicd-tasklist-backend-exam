# Projet
sonar.projectKey=tasklist-backend-exam
sonar.projectName=TaskList Backend Exam

# Serveur SonarQube
sonar.host.url=https://sonarqube.cicd.kits.ext.educentre.fr

# Sources
sonar.sources=src

# Tests
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*.ts

# Exclusions
sonar.exclusions=node_modules/**,dist/**,coverage/**,reports/**,prisma/migrations/**,**/*.config.ts,**/*.config.js
sonar.test.exclusions=node_modules/**,dist/**
sonar.coverage.exclusions=src/server.ts,src/lib/prisma.ts,src/__tests__/**

# Couverture de tests TypeScript / JavaScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info,coverage/unit/lcov.info,coverage/e2e/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info,coverage/unit/lcov.info,coverage/e2e/lcov.info

# Encodage
sonar.sourceEncoding=UTF-8

# Duplication
sonar.cpd.exclusions=src/__tests__/**
